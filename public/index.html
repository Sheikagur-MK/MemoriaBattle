<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEO-STORM BATTLE ROYALE 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-overlay">Cargando Motores de Renderizado...</div>

    <section id="auth-screen" class="active">
        <div class="video-bg"></div>
        <div class="auth-container">
            <h1 class="glitch" data-text="GEO-STORM">GEO-STORM</h1>
            <div id="auth-box">
                <input id="auth-email" type="email" placeholder="CORREO ELECTRÓNICO">
                <input id="auth-pass" type="password" placeholder="CONTRASEÑA">
                <input id="auth-user" type="text" placeholder="NOMBRE DE PILOTO" class="hidden">
                <div class="auth-buttons">
                    <button id="btn-main-action">ENTRAR AL NEXO</button>
                    <button id="btn-toggle-auth" class="secondary">REGISTRAR NUEVA CUENTA</button>
                </div>
                <p id="auth-error"></p>
            </div>
        </div>
    </section>

    <section id="lobby-screen">
        <div class="lobby-ui">
            <div class="user-stats">
                <span id="player-name">PILOTO</span>
                <span id="player-points">0 PTS</span>
            </div>
            <div class="main-menu">
                <button onclick="startGame()" class="btn-mega">INICIAR BATTLE ROYALE (100 JUGADORES)</button>
                <div class="grid-menu">
                    <button onclick="openStore()">TIENDA DE SKINS</button>
                    <button onclick="openOptions()">CONFIGURACIÓN</button>
                    <button onclick="logout()">DESCONECTAR</button>
                </div>
            </div>
        </div>
        <div id="preview-container"></div> </section>

    <section id="game-screen">
        <canvas id="render-canvas"></canvas>
        <div class="game-hud">
            <div class="hp-bar-container"><div id="hp-fill"></div></div>
            <div id="game-stats">VIVOS: 100 | POS: 0, 0</div>
            <div id="ability-icon">HABILIDAD LISTA</div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
